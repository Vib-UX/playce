# Secret declarations for the chess result feed.
#
# The Lichess game-export API is public, so the default workflow needs NO
# secrets. If you later create challenges/games as a Lichess account and want
# authenticated reads, declare a token here and reference it in main.ts via
# `runtime.getSecret({ id: "LICHESS_TOKEN" }).result()`.
#
# Locally the value comes from .env (LICHESS_TOKEN=...); in production it is
# uploaded to the Vault DON with `cre secrets create`.
secrets:
  # - id: LICHESS_TOKEN
  #   provider: env
