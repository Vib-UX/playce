<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" fill="none">
  
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff2e88" />
      <stop offset="55%" stop-color="#18d9c0" />
      <stop offset="100%" stop-color="#c2ff3d" />
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff2e88" />
      <stop offset="55%" stop-color="#18d9c0" />
      <stop offset="100%" stop-color="#c2ff3d" />
    </linearGradient>
    <radialGradient id="glowPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2e88" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ff2e88" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowLime" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c2ff3d" stop-opacity="0.32" />
      <stop offset="100%" stop-color="#c2ff3d" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#18d9c0" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#18d9c0" stop-opacity="0" />
    </radialGradient>
    <pattern id="tri" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M11 9 L19 14 L11 19 Z" fill="#ffffff" fill-opacity="0.035" />
    </pattern>
  </defs>
  <rect width="1500" height="500" fill="#0a0912" />
  <rect width="1500" height="500" fill="url(#tri)" />

  <circle cx="220" cy="70" r="300" fill="url(#glowPink)" />
  <circle cx="1350" cy="60" r="280" fill="url(#glowTeal)" />
  <circle cx="1320" cy="470" r="320" fill="url(#glowLime)" />

  <rect x="0" y="0" width="1500" height="6" fill="url(#brand)" />

  
  <g transform="translate(330 110) rotate(-8)">
    <rect x="-84" y="-26" width="168" height="56" rx="16" fill="#000000" fill-opacity="0.35" transform="translate(0 6)" />
    <rect x="-84" y="-26" width="168" height="56" rx="16" fill="#ff2e88" />
    <text x="0" y="9" text-anchor="middle" font-family="'Bricolage Grotesque', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="-0.5" fill="#ffffff">Show up</text>
  </g>
  
  <g transform="translate(1200 110) rotate(7)">
    <rect x="-55" y="-26" width="110" height="56" rx="16" fill="#000000" fill-opacity="0.35" transform="translate(0 6)" />
    <rect x="-55" y="-26" width="110" height="56" rx="16" fill="#18d9c0" />
    <text x="0" y="9" text-anchor="middle" font-family="'Bricolage Grotesque', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="-0.5" fill="#ffffff">Play</text>
  </g>
  
  <g transform="translate(1330 300) rotate(-7)">
    <rect x="-55" y="-26" width="110" height="56" rx="16" fill="#000000" fill-opacity="0.35" transform="translate(0 6)" />
    <rect x="-55" y="-26" width="110" height="56" rx="16" fill="#c2ff3d" />
    <text x="0" y="9" text-anchor="middle" font-family="'Bricolage Grotesque', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="-0.5" fill="#0a0912">Earn</text>
  </g>
  
  <g transform="translate(1070 400) rotate(8)">
    <rect x="-75" y="-26" width="150" height="56" rx="16" fill="#000000" fill-opacity="0.35" transform="translate(0 6)" />
    <rect x="-75" y="-26" width="150" height="56" rx="16" fill="#ff7a3d" />
    <text x="0" y="9" text-anchor="middle" font-family="'Bricolage Grotesque', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="-0.5" fill="#ffffff">Collect</text>
  </g>

  <g transform="translate(562 168)">
    
  <g transform="scale(2.4)">
    <rect x="0" y="0" width="32" height="32" rx="9" fill="url(#mark)" />
    <path d="M16 7.4a6.1 6.1 0 0 1 6.1 6.1c0 4.3-6.1 10.8-6.1 10.8S9.9 17.8 9.9 13.5A6.1 6.1 0 0 1 16 7.4z" fill="#ffffff" />
    <path d="M14.4 10.9v5.2l4.4-2.6z" fill="#ff2e88" />
  </g>
  <text x="94.39999999999999" y="72.84" font-family="'Bricolage Grotesque', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="66" font-weight="800" letter-spacing="-2" fill="#ffffff">Playces</text>
  <rect x="350" y="48" width="18" height="18" rx="3" fill="url(#brand)" />
  </g>

  <text x="750" y="340" text-anchor="middle" font-family="'Bricolage Grotesque', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="40" font-weight="700" letter-spacing="-1" fill="#ffffff" fill-opacity="0.92">Turn venues into onchain arenas.</text>
