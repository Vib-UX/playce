[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    # CCIP contracts come from the chainlink-local submodule's vendored
    # chainlink-ccip. Populate once with:
    #   git submodule update --init --recursive contracts/lib/chainlink-local
    "@chainlink/contracts-ccip/=lib/chainlink-local/lib/chainlink-ccip/chains/evm/",
    "@openzeppelin/contracts@5.0.2/=lib/chainlink-local/src/vendor/openzeppelin-solidity/v5.0.2/contracts/",
]

[rpc_endpoints]
sepolia = "https://ethereum-sepolia-rpc.publicnode.com"
base = "https://mainnet.base.org"
base_sepolia = "https://sepolia.base.org"

# Ethereum Sepolia — chain id 11155111
# Base Sepolia      — chain id 84532
# Base Mainnet      — chain id 8453
